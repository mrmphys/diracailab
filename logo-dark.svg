<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!-- Dark background version -->
  <rect x="0" y="0" width="320" height="80" rx="0" fill="#0f0f0f"/>

  <!-- Lambda mark box -->
  <rect x="12" y="8" width="56" height="56" rx="8" fill="#0077ff"/>

  <!-- Lambda symbol -->
  <text x="40" y="52" 
    font-family="Georgia, serif" 
    font-size="38" 
    font-weight="bold"
    fill="#ffffff" 
