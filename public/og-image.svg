<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f0f0f"/>

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Blue accent left bar -->
  <rect x="0" y="0" width="6" height="630" fill="#0077ff"/>

  <!-- Glow effect behind lambda -->
  <ellipse cx="200" cy="315" rx="140" ry="140" fill="#0077ff" opacity="0.08"/>

  <!-- Lambda mark -->
  <rect x="80" y="195" width="200" height="200" rx="28" fill="#0077ff"/>
  <text x="180" y="345"
    font-family="Georgia, serif"
    font-size="148"
    font-weight="bold"
    fill="#ffffff"
    text-anchor="middle">λ</text>

  <!-- Company name -->
  <text x="320" y="280"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="72"
    font-weight="900"
    fill="#ffffff"
    letter-spacing="-2">Dirac AI Lab</text>

  <!-- Tagline -->
  <text x="320" y="345"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="28"
    font-weight="300"
    fill="#888888"
    letter-spacing="1">We build AI that works.</text>

  <!-- Divider -->
  <line x1="320" y1="385" x2="900" y2="385" stroke="#222222" stroke-width="1"/>

  <!-- Services row -->
  <text x="320" y="425"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="18"
    fill="#0077ff"
    letter-spacing="2">VOICE AI AGENTS</text>

  <text x="540" y="425"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="18"
    fill="#444444">·</text>

  <text x="565" y="425"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="18"
    fill="#0077ff"
    letter-spacing="2">CUSTOM SAAS</text>

  <text x="740" y="425"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="18"
    fill="#444444">·</text>

  <text x="765" y="425"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="18"
    fill="#0077ff"
    letter-spacing="2">LLM INTEGRATION</text>

  <!-- URL -->
  <text x="1180" y="600"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="20"
    fill="#333333"
    text-anchor="end">diracailab.com</text>
</svg>
