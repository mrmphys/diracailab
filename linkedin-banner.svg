<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <!-- Background -->
  <rect x="0" y="0" width="1584" height="396" fill="#0f0f0f"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="1584" height="396" fill="url(#grid)"/>

  <!-- Blue accent line left -->
  <rect x="0" y="0" width="4" height="396" fill="#0077ff"/>

  <!-- Lambda mark -->
  <rect x="80" y="118" width="120" height="120" rx="16" fill="#0077ff"/>
  <text x="140" y="210"
    font-family="Georgia, serif"
    font-size="88"
    font-weight="bold"
    fill="#ffffff"
    text-anchor="middle">λ</text>

  <!-- Company name -->
  <text x="230" y="175"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="52"
    font-weight="900"
    fill="#ffffff"
    letter-spacing="-1">Dirac AI Lab</text>

  <!-- Tagline -->
  <text x="230" y="225"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="24"
    font-weight="300"
    fill="#888888"
    letter-spacing="0.5">We build AI that works.</text>

  <!-- Right side — services -->
  <line x1="900" y1="100" x2="900" y2="296" stroke="#222222" stroke-width="1"/>

  <text x="940" y="145"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="16"
    font-weight="400"
    fill="#0077ff"
    letter-spacing="2">WHAT WE BUILD</text>

  <text x="940" y="185"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="18"
    font-weight="300"
    fill="#cccccc">Voice AI Agents</text>

  <text x="940" y="215"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="18"
    font-weight="300"
    fill="#cccccc">Custom SaaS Platforms</text>

  <text x="940" y="245"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="18"
    font-weight="300"
    fill="#cccccc">LLM Integrations</text>

  <text x="940" y="275"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="18"
    font-weight="300"
    fill="#cccccc">Intelligent Automation</text>

  <!-- Website -->
  <text x="1450" y="370"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="16"
    font-weight="400"
    fill="#444444"
    text-anchor="end">diracailab.com</text>
</svg>
