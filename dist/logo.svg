<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;900&amp;display=swap');
    </style>
  </defs>

  <!-- Lambda mark box -->
  <rect x="0" y="0" width="64" height="64" rx="10" fill="#0f0f0f"/>

  <!-- Lambda symbol -->
  <text x="32" y="48" 
    font-family="Georgia, serif" 
    font-size="42" 
    font-weight="bold"
    fill="#0077ff" 
    text-anchor="middle">λ</text>

  <!-- Company name -->
  <text x="82" y="30" 
    font-family="'Rubik', 'Helvetica Neue', Arial, sans-serif" 
    font-size="22" 
    font-weight="900"
    fill="#0f0f0f" 
    letter-spacing="-0.5">Dirac</text>

  <text x="82" y="56" 
    font-family="'Rubik', 'Helvetica Neue', Arial, sans-serif" 
    font-size="16" 
    font-weight="400"
    fill="#555555"
    letter-spacing="1.5">AI LAB</text>
</svg>
